worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 100m;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    image/svg+xml;

  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream website_upstream {
    zone website_upstream 64k;
    server website:80 resolve;
  }

  upstream panel_upstream {
    zone panel_upstream 64k;
    server panel:80 resolve;
  }

  upstream backend_upstream {
    zone backend_upstream 64k;
    server backend:8080 resolve;
  }

  server {
    listen 80;
    server_name sangehassan.com www.sangehassan.com 91.239.211.60;

    return 301 https://sangehassan.com$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name sangehassan.com;

    ssl_certificate /etc/nginx/ssl/prod-com/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/prod-com/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /images/ {
      alias /var/www/images/;
      autoindex off;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      try_files $uri =404;
    }

    location /protected-images/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /panel {
      return 301 /panel/;
    }

    location /panel/ {
      proxy_pass http://panel_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      proxy_pass http://website_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name www.sangehassan.com 91.239.211.60;

    ssl_certificate /etc/nginx/ssl/prod-com/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/prod-com/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://sangehassan.com$request_uri;
  }
}
