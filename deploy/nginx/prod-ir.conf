worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    image/svg+xml;

  upstream website_upstream {
    server website:80;
  }

  upstream panel_upstream {
    server panel:80;
  }

  upstream backend_upstream {
    server backend:8080;
  }

  server {
    listen 80;
    server_name sangehassan.ir www.sangehassan.ir 185.53.141.157;
    return 301 https://sangehassan.com$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name sangehassan.ir www.sangehassan.ir;

    ssl_certificate /etc/nginx/ssl/prod-ir/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/prod-ir/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://sangehassan.com$request_uri;
  }
}
