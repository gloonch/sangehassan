version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: sangehassan-db
    env_file: .prod.env
    environment:
      POSTGRES_USER: ${DB_USER:-sangehassan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-sangehassan}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - pg_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ../back
      target: prod
    container_name: sangehassan-backend
    env_file: .prod.env
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      # Persist uploads and share with nginx in prod.
      - images_data_prod:/app/storage/images
      # Seed the volume from the repo's checked-in images on first start.
      - ../back/storage/images:/seed/images:ro

  website:
    build:
      context: ../front
      dockerfile: website/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL}
    container_name: sangehassan-website
    env_file: .prod.env
    ports:
      - "3000:80"

  panel:
    build:
      context: ../front
      dockerfile: panel/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL}
    container_name: sangehassan-panel
    env_file: .prod.env
    ports:
      - "3001:80"

  nginx:
    image: nginx:alpine
    container_name: sangehassan-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - images_data_prod:/var/www/images:ro

volumes:
  pg_data_prod:
  images_data_prod:
