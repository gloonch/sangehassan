services:
  db:
    image: postgres:15-alpine
    container_name: sangehassan-db
    env_file: .prod-com.env
    environment:
      POSTGRES_USER: ${DB_USER:-sangehassan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-sangehassan}
    expose:
      - "5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - pg_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ../back
      target: prod
    container_name: sangehassan-backend
    env_file: .prod-com.env
    depends_on:
      - db
    expose:
      - "8080"
    volumes:
      - images_data_prod:/app/storage/images
      - ../back/storage/images:/seed/images:ro

  website:
    build:
      context: ../front
      dockerfile: website/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-}
        VITE_SITE_URL: ${VITE_SITE_URL:-}
        VITE_PRERENDER_API_BASE_URL: ${VITE_PRERENDER_API_BASE_URL:-}
        VITE_SITEMAP_LASTMOD: ${VITE_SITEMAP_LASTMOD:-}
    container_name: sangehassan-website
    env_file: .prod-com.env
    expose:
      - "80"

  panel:
    build:
      context: ../front
      dockerfile: panel/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-}
    container_name: sangehassan-panel
    env_file: .prod-com.env
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: sangehassan-nginx
    depends_on:
      - backend
      - website
      - panel
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod-com.conf:/etc/nginx/nginx.conf:ro
      - images_data_prod:/var/www/images:ro

volumes:
  pg_data_prod:
  images_data_prod:
