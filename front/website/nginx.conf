server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  error_page 404 /404.html;
  absolute_redirect off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    image/svg+xml;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /404.html {
    internal;
    add_header Cache-Control "no-cache";
    add_header X-Robots-Tag "noindex, follow, noarchive" always;
  }

  location ~ ^/(?:blogs|(?:en|fa|ar)/blogs)(?:/|$) {
    try_files $uri $uri.html $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location = /products/overview {
    return 301 /products;
  }

  location ~ ^/(?:login|signup|profile|gallery|ads/new)/?$ {
    try_files $uri $uri.html $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Catalog routes are generated at build time. Unknown catalog paths must be real 404s.
  location ~ ^/(en|fa|ar)/products/?$ {
    try_files $uri.html $uri/index.html =404;
    add_header Cache-Control "no-cache";
    if ($args != "") {
      add_header X-Robots-Tag "noindex, follow" always;
    }
  }

  location ~ ^/(en|fa|ar)/products/ {
    try_files $uri.html $uri/index.html =404;
    add_header Cache-Control "no-cache";
    if ($args != "") {
      add_header X-Robots-Tag "noindex, follow" always;
    }
  }

  # Dynamic public detail pages may be added between website rebuilds, so keep SPA fallback for them.
  location ~ ^/(?:blocks|projects|ads)/ {
    try_files $uri $uri.html $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Serve prerendered/static routes. Unknown unrelated paths should be real 404s for SEO.
  location / {
    try_files $uri $uri.html $uri/ =404;
    add_header Cache-Control "no-cache";
  }
}
