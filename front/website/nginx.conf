server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    image/svg+xml;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Catalog routes are generated at build time. Unknown catalog paths must be real 404s.
  location ~ ^/(en|fa|ar)/products/?$ {
    try_files $uri.html $uri/index.html =404;
    add_header Cache-Control "no-cache";
    if ($args != "") {
      add_header X-Robots-Tag "noindex, follow" always;
    }
  }

  location ~ ^/(en|fa|ar)/products/ {
    try_files $uri.html $uri/index.html =404;
    add_header Cache-Control "no-cache";
    if ($args != "") {
      add_header X-Robots-Tag "noindex, follow" always;
    }
  }

  # Serve prerendered HTML when it exists; fall back to the SPA shell.
  location / {
    try_files $uri $uri.html $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
